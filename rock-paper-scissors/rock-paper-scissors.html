<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rock-paper-scissors.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <div class="container">
      <div class="btns">
        <button class="choice">Rock</button>
        <button class="choice">Paper</button>
        <button class="choice">Scissors</button>
        <button class="reset">Reset</button>
      </div>
      <div class="scores">
        <p>Player score: <span class="player-score">0</span></p>
        <p>Computer score: <span class="computer-score">0</span></p>
      </div>
      <div class="choices">
        <p>Player choice: <span class="player-choice"></span></p>
        <p>Computer choice: <span class="computer-choice"></span></p>
      </div>
      <p class="result">First one to reach the 5 score points wins the game!</p>
    </div>
    <script src="rock-paper-scissors.js"></script>
  </body>
</html>
